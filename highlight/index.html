<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>karuta-3d HIGHLIGHT</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden;
                font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #eee; }
  #c { display: block; width: 100vw; height: 100vh; }
  #hud { position: fixed; bottom: 24px; left: 24px; right: 24px;
          display: flex; justify-content: space-between; pointer-events: none; }
  #title { font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.6; }
  #time { font-variant-numeric: tabular-nums; font-size: 13px; opacity: 0.6; }
  #ctrl { position: fixed; top: 24px; right: 24px; display: flex; gap: 8px; }
  button { background: rgba(255,255,255,0.08); color: #eee; border: 1px solid rgba(255,255,255,0.15);
           padding: 6px 14px; font-size: 12px; cursor: pointer; letter-spacing: 0.05em;
           text-transform: uppercase; }
  button:hover { background: rgba(255,255,255,0.15); }
  button.active { background: rgba(100, 200, 255, 0.3); border-color: #5cf; }
  #takeFlash { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                font-size: 72px; font-weight: 100; letter-spacing: 0.3em;
                opacity: 0; pointer-events: none; color: #fff;
                text-shadow: 0 0 40px #5cf, 0 0 80px #5cf; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="title">karuta 3d highlight</div>
  <div id="time">0.00 / 0.00</div>
</div>
<div id="ctrl">
  <button id="btnOrbit" class="active">ORBIT</button>
  <button id="btnPause">PAUSE</button>
  <button id="btnReset">RESET</button>
</div>
<div id="takeFlash">TAKE</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// =============================================================
// データ読み込み
// =============================================================

const data = await fetch('./data.json').then(r => r.json());
console.log('loaded', data.meta);

const meta = data.meta;
const frames = data.frames;
const cards = data.cards || [];
const takeMoments = data.take_moments || [];
const duration = meta.duration || (frames[frames.length-1].t - frames[0].t);
const t0 = frames[0].t;

// =============================================================
// シーン
// =============================================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);
scene.fog = new THREE.FogExp2(0x000008, 0.4);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 0.01, 50);
camera.position.set(0.0, 0.7, 1.2);
camera.lookAt(0, 0.15, 0);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

// 照明（控えめ、発光主体）
scene.add(new THREE.AmbientLight(0x223355, 0.4));
const dir = new THREE.DirectionalLight(0x88aaff, 0.5);
dir.position.set(2, 3, 2);
scene.add(dir);

// =============================================================
// 座標系: Python 側で「札が Y=0（地面）、Y+ が上」に揃えてある
// X と Z 方向だけ中心に寄せる（Y は地面基準で変更しない）
// =============================================================

const allPts = [];
for (const f of frames) for (const k in f.points) allPts.push(f.points[k]);
for (const card of cards) for (const c of card.corners) allPts.push(c);
const cx = allPts.reduce((s, p) => s + p[0], 0) / allPts.length;
const cz = allPts.reduce((s, p) => s + p[2], 0) / allPts.length;
const centered = (p) => [p[0] - cx, p[1], p[2] - cz];

// =============================================================
// 床グリッド（札平面 = Y=0 に配置）
// =============================================================

const grid = new THREE.GridHelper(2, 20, 0x1a4a7a, 0x002244);
grid.position.y = 0;
scene.add(grid);

// 地面の仄かな発光プレート
const floorGeom = new THREE.PlaneGeometry(2, 2);
const floorMat  = new THREE.MeshBasicMaterial({
  color: 0x001122, transparent: true, opacity: 0.6, side: THREE.DoubleSide
});
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.001;
scene.add(floor);

// =============================================================
// 札
// =============================================================

const cardGroup = new THREE.Group();
for (const card of cards) {
  const corners = card.corners.map(centered);
  const pts = corners.map(c => new THREE.Vector3(c[0], c[1] + 0.002, c[2]));
  pts.push(pts[0]);   // 閉じる
  const geom = new THREE.BufferGeometry().setFromPoints(pts);
  const mat  = new THREE.LineBasicMaterial({
    color: 0xffcc66, transparent: true, opacity: 0.9
  });
  cardGroup.add(new THREE.Line(geom, mat));

  // 塗りつぶし（札は Y=0 平面に寝ている想定）
  const v = corners.map(c => new THREE.Vector3(c[0], c[1], c[2]));
  const fillGeom = new THREE.BufferGeometry();
  // 2つの三角形で四角を貼る
  const vs = [v[0], v[1], v[2], v[0], v[2], v[3]];
  fillGeom.setFromPoints(vs);
  fillGeom.computeVertexNormals();
  const fillMat = new THREE.MeshBasicMaterial({
    color: 0x886600, transparent: true, opacity: 0.25, side: THREE.DoubleSide
  });
  cardGroup.add(new THREE.Mesh(fillGeom, fillMat));
}
scene.add(cardGroup);

// =============================================================
// 手のキーポイント・スケルトン
// =============================================================

const colors = {
  wrist:             0xff4466,
  index_finger_tip:  0x55aaff,
  middle_finger_tip: 0x66ffaa,
};

const jointMeshes = {};
const jointGeom = new THREE.SphereGeometry(0.012, 20, 20);
for (const lm of meta.landmarks) {
  const mat = new THREE.MeshBasicMaterial({ color: colors[lm] || 0xffffff });
  const m = new THREE.Mesh(jointGeom, mat);
  scene.add(m);
  jointMeshes[lm] = m;
}

// スケルトン線
const skeletonLines = [];
for (const [a, b] of meta.connections) {
  const geom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
  const mat  = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
  const line = new THREE.Line(geom, mat);
  scene.add(line);
  skeletonLines.push({ a, b, line });
}

// =============================================================
// 手首の軌跡（ネオンリボン）
// =============================================================

const TRAIL_MAX = 120;                // 保持する点数
const trailPoints = [];               // Vector3 配列
const trailMat = new THREE.LineBasicMaterial({
  vertexColors: true, transparent: true, linewidth: 2
});
const trailGeom = new THREE.BufferGeometry();
const trailLine = new THREE.Line(trailGeom, trailMat);
scene.add(trailLine);

function updateTrail() {
  if (trailPoints.length < 2) return;
  const positions = [];
  const colorArr  = [];
  for (let i = 0; i < trailPoints.length; i++) {
    const p = trailPoints[i];
    positions.push(p.x, p.y, p.z);
    const a = i / trailPoints.length;
    // 古い→青、新しい→ピンクのグラデ
    colorArr.push(a * 1.0, a * 0.3, 1.0 - a * 0.5);
  }
  trailGeom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  trailGeom.setAttribute('color',    new THREE.Float32BufferAttribute(colorArr, 3));
  trailGeom.setDrawRange(0, trailPoints.length);
}

// =============================================================
// 補間（CatmullRomで60fps滑らか再生）
// =============================================================

function interpolateFrameAt(timeRel) {
  // frame timeline は frames[i].t - t0
  // 指定時刻に対して前後2フレームを使って catmull-rom 補間
  const timeline = frames.map(f => f.t - t0);
  let i1 = 0;
  for (let i = 0; i < timeline.length - 1; i++) {
    if (timeline[i] <= timeRel && timeRel <= timeline[i+1]) {
      i1 = i;
      break;
    }
  }
  const i0 = Math.max(0, i1 - 1);
  const i2 = Math.min(frames.length - 1, i1 + 1);
  const i3 = Math.min(frames.length - 1, i1 + 2);

  const t1 = timeline[i1], t2 = timeline[i2];
  const span = (t2 - t1) || 1;
  const local = (timeRel - t1) / span;

  const result = {};
  for (const lm of meta.landmarks) {
    const p0 = frames[i0].points[lm];
    const p1 = frames[i1].points[lm];
    const p2 = frames[i2].points[lm];
    const p3 = frames[i3].points[lm];
    const out = [0,0,0];
    // catmull-rom
    for (let d = 0; d < 3; d++) {
      const t = local, t2 = t*t, t3 = t*t*t;
      out[d] = 0.5 * (
        (2*p1[d]) +
        (-p0[d] + p2[d]) * t +
        (2*p0[d] - 5*p1[d] + 4*p2[d] - p3[d]) * t2 +
        (-p0[d] + 3*p1[d] - 3*p2[d] + p3[d]) * t3
      );
    }
    result[lm] = centered(out);
  }
  return result;
}

// =============================================================
// Take フラッシュ
// =============================================================

const takeFlashEl = document.getElementById('takeFlash');
const triggeredTakes = new Set();

function triggerTakeFlash() {
  takeFlashEl.style.opacity = 1;
  takeFlashEl.style.transition = 'none';
  setTimeout(() => {
    takeFlashEl.style.transition = 'opacity 0.8s';
    takeFlashEl.style.opacity = 0;
  }, 50);
}

// =============================================================
// Bloom ポストプロセス
// =============================================================

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.2,   // strength
  0.6,   // radius
  0.1    // threshold
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// =============================================================
// コントロール
// =============================================================

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.target.set(0, 0.15, 0);   // 少し上を見る

let autoOrbit = true;
let paused    = false;
let playbackStart = performance.now();

// マウス操作で自動回転を一時停止
renderer.domElement.addEventListener('pointerdown', () => {
  if (autoOrbit) {
    autoOrbit = false;
    document.getElementById('btnOrbit').classList.remove('active');
  }
});

document.getElementById('btnOrbit').onclick = (e) => {
  autoOrbit = !autoOrbit;
  e.target.classList.toggle('active', autoOrbit);
};
document.getElementById('btnPause').onclick = (e) => {
  paused = !paused;
  e.target.classList.toggle('active', paused);
  if (!paused) playbackStart = performance.now() - currentTime * 1000;
};
document.getElementById('btnReset').onclick = () => {
  playbackStart = performance.now();
  trailPoints.length = 0;
  triggeredTakes.clear();
};

// =============================================================
// アニメーションループ
// =============================================================

let currentTime = 0;
const timeEl = document.getElementById('time');

function animate() {
  requestAnimationFrame(animate);

  if (!paused) {
    const elapsed = (performance.now() - playbackStart) / 1000;
    currentTime = elapsed % duration;
  }

  const f = interpolateFrameAt(currentTime);

  // ジョイント位置更新
  for (const lm of meta.landmarks) {
    const p = f[lm];
    jointMeshes[lm].position.set(p[0], p[1], p[2]);
  }

  // スケルトン線
  for (const { a, b, line } of skeletonLines) {
    const posAttr = line.geometry.attributes.position;
    posAttr.setXYZ(0, f[a][0], f[a][1], f[a][2]);
    posAttr.setXYZ(1, f[b][0], f[b][1], f[b][2]);
    posAttr.needsUpdate = true;
  }

  // 軌跡更新
  const w = f.wrist;
  trailPoints.push(new THREE.Vector3(w[0], w[1], w[2]));
  if (trailPoints.length > TRAIL_MAX) trailPoints.shift();
  updateTrail();

  // Take フラッシュ
  for (const tm of takeMoments) {
    if (!triggeredTakes.has(tm) && currentTime >= tm - t0 && currentTime < tm - t0 + 0.1) {
      triggerTakeFlash();
      triggeredTakes.add(tm);
    }
  }
  // リセット時に triggeredTakes もリセットされる

  // 自動回転（地面水平＋少し上から見下ろす）
  if (autoOrbit) {
    const r = 1.1;
    const angle = performance.now() * 0.00015;
    const target = new THREE.Vector3(0, 0.15, 0);
    camera.position.set(
      target.x + Math.sin(angle) * r,
      target.y + 0.5 + Math.sin(angle * 0.7) * 0.1,
      target.z + Math.cos(angle) * r
    );
    camera.lookAt(target);
    controls.target.copy(target);   // 手動に切り替えたとき違和感ないように
  } else {
    controls.update();
  }

  // HUD
  timeEl.textContent = `${currentTime.toFixed(2)} / ${duration.toFixed(2)}`;

  composer.render();
}

animate();

// =============================================================
// リサイズ
// =============================================================

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
